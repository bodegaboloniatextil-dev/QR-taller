<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR | Taller de Costura Marbelly</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5faf9;
      color: #18212f;
    }

    main {
      width: min(100%, 420px);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 auto 18px;
      max-width: 32ch;
      color: #5c6675;
      line-height: 1.45;
    }

    .qr-card {
      padding: 18px;
      border: 1px solid #d9e2e0;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 16px 36px rgba(24, 33, 47, 0.1);
    }

    img {
      display: block;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1;
      margin: 0 auto;
    }

    .url {
      display: block;
      margin-top: 14px;
      color: #0f766e;
      font-size: 0.9rem;
      overflow-wrap: anywhere;
    }

    @media print {
      body {
        background: #fff;
      }

      .qr-card {
        border: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>QR de pago</h1>
    <p>Escanea para abrir las cuentas de Taller de Costura Marbelly.</p>
    <section class="qr-card" aria-label="Código QR">
      <img id="qr" alt="Código QR para abrir la página de cuentas de pago">
      <strong class="url" id="target"></strong>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const fallback = new URL("index.html", location.href).href;
    const target = params.get("url") || fallback;
    const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=900x900&margin=24&data=" + encodeURIComponent(target);

    document.getElementById("qr").src = qrUrl;
    document.getElementById("target").textContent = target;
  </script>
</body>
</html>
